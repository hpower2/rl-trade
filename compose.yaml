x-python-service: &python-service
  image: rl-trade-python:local

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rl_trade}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  migrate:
    <<: *python-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/rl_trade}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      PAPER_TRADING_ONLY: ${PAPER_TRADING_ONLY:-true}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
    command:
      [
        "sh",
        "/app/docker/scripts/start-python-service.sh",
        "migrate",
        "python",
        "-m",
        "alembic",
        "upgrade",
        "head",
      ]
    restart: "no"

  api:
    <<: *python-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_AUTH_MODE: ${API_AUTH_MODE:-disabled}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      API_AUTH_SUBJECT: ${API_AUTH_SUBJECT:-operator}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/rl_trade}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      MT5_TERMINAL_PATH: ${MT5_TERMINAL_PATH:-/opt/metatrader5/terminal64.exe}
      MT5_LOGIN: ${MT5_LOGIN:-}
      MT5_PASSWORD: ${MT5_PASSWORD:-}
      MT5_SERVER: ${MT5_SERVER:-}
      PAPER_TRADING_ONLY: ${PAPER_TRADING_ONLY:-true}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      MODEL_APPROVAL_MIN_CONFIDENCE: ${MODEL_APPROVAL_MIN_CONFIDENCE:-70}
      MODEL_APPROVAL_MIN_RISK_REWARD: ${MODEL_APPROVAL_MIN_RISK_REWARD:-2.0}
      MODEL_APPROVAL_MIN_SAMPLE_SIZE: ${MODEL_APPROVAL_MIN_SAMPLE_SIZE:-100}
      MODEL_APPROVAL_MAX_DRAWDOWN: ${MODEL_APPROVAL_MAX_DRAWDOWN:-20.0}
      ARTIFACTS_ROOT_DIR: /app/.artifacts
      REQUIRE_CUDA: ${REQUIRE_CUDA:-false}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    command: ["sh", "/app/docker/scripts/start-python-service.sh", "api", "rl-trade-api"]
    volumes:
      - artifacts-data:/app/.artifacts
    restart: unless-stopped

  worker:
    <<: *python-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/rl_trade}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      WORKER_QUEUES: ${CPU_WORKER_QUEUES:-ingestion,preprocessing,evaluation,trading,maintenance}
      WORKER_CONCURRENCY: ${CPU_WORKER_CONCURRENCY:-1}
      WORKER_PREFETCH_MULTIPLIER: ${CPU_WORKER_PREFETCH_MULTIPLIER:-1}
      MT5_TERMINAL_PATH: ${MT5_TERMINAL_PATH:-/opt/metatrader5/terminal64.exe}
      MT5_LOGIN: ${MT5_LOGIN:-}
      MT5_PASSWORD: ${MT5_PASSWORD:-}
      MT5_SERVER: ${MT5_SERVER:-}
      PAPER_TRADING_ONLY: ${PAPER_TRADING_ONLY:-true}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      ARTIFACTS_ROOT_DIR: /app/.artifacts
      REQUIRE_CUDA: "false"
    command: ["sh", "/app/docker/scripts/start-python-service.sh", "worker", "rl-trade-worker"]
    volumes:
      - artifacts-data:/app/.artifacts
    restart: unless-stopped

  training_worker:
    <<: *python-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/rl_trade}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      WORKER_QUEUES: ${TRAINING_WORKER_QUEUES:-supervised_training,rl_training}
      WORKER_CONCURRENCY: ${TRAINING_WORKER_CONCURRENCY:-1}
      WORKER_PREFETCH_MULTIPLIER: ${TRAINING_WORKER_PREFETCH_MULTIPLIER:-1}
      MT5_TERMINAL_PATH: ${MT5_TERMINAL_PATH:-/opt/metatrader5/terminal64.exe}
      MT5_LOGIN: ${MT5_LOGIN:-}
      MT5_PASSWORD: ${MT5_PASSWORD:-}
      MT5_SERVER: ${MT5_SERVER:-}
      PAPER_TRADING_ONLY: ${PAPER_TRADING_ONLY:-true}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      ARTIFACTS_ROOT_DIR: /app/.artifacts
      REQUIRE_CUDA: ${TRAINING_WORKER_REQUIRE_CUDA:-false}
      NVIDIA_VISIBLE_DEVICES: ${TRAINING_WORKER_NVIDIA_VISIBLE_DEVICES:-void}
    command: ["sh", "/app/docker/scripts/start-python-service.sh", "training_worker", "rl-trade-worker"]
    volumes:
      - artifacts-data:/app/.artifacts
    restart: unless-stopped

  scheduler:
    <<: *python-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/rl_trade}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      SCHEDULER_HEARTBEAT_INTERVAL_SECONDS: ${SCHEDULER_HEARTBEAT_INTERVAL_SECONDS:-60}
      SCHEDULER_MAX_INTERVAL_SECONDS: ${SCHEDULER_MAX_INTERVAL_SECONDS:-10}
      PAPER_TRADING_ONLY: ${PAPER_TRADING_ONLY:-true}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      ARTIFACTS_ROOT_DIR: /app/.artifacts
      REQUIRE_CUDA: "false"
    command: ["sh", "/app/docker/scripts/start-python-service.sh", "scheduler", "rl-trade-scheduler"]
    volumes:
      - artifacts-data:/app/.artifacts
    restart: unless-stopped

  frontend:
    image: rl-trade-frontend:latest
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4173').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "${FRONTEND_HOST_PORT:-4173}:4173"
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  artifacts-data:
