name: Backend Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Run backend docs and smoke tests
        run: python -m pytest tests/smoke/test_setup_docs.py tests/api/test_health.py tests/smoke/test_core_workflow_dry_run.py -q

      - name: Run backend hardening regression lane
        run: make validate-hardening-backend

      - name: Run core backend dry run
        run: make validate-core-smoke
